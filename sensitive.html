```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>センシティブ企画</title>
<link rel="icon" href="iconsens.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h1>センシティブ企画</h1>
<div id="list"></div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbyyp2QpqsWxeP4eDrB_ftmSrii5Ymy4VZuhM0UxlzTNZbqIXgELZ__Xc0KxfZU6tRyw/exec";
const CAMP_START_DATE = "2026/08/20";

function resolveRealDate(dayLabel) {
  const [y,m,d] = CAMP_START_DATE.split("/").map(Number);
  const base = new Date(y,m-1,d);

  if (dayLabel === "2日目") base.setDate(base.getDate()+1);
  if (dayLabel === "3日目") base.setDate(base.getDate()+2);

  return base;
}

function parseDateTime(date, time) {
  if (!time || time === "未定") return null;

  const d = resolveRealDate(date);
  const [h,m] = time.split(":").map(Number);

  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, m);
}

function normalizeEvent(ev) {
  return {
    ...ev,
    start: parseDateTime(ev.date, ev.start_time),
    end: parseDateTime(ev.date, ev.end_time),
    sensitive: String(ev.sensitive).toUpperCase() === "TRUE"
  };
}

async function init() {
  const res = await fetch(DATA_URL);
  const json = await res.json();

  const events = json.events
    .map(normalizeEvent)
    .filter(e => e.sensitive);

  document.getElementById("list").innerHTML =
    events.map(e => `<div>${e.title} / ${e.date}</div>`).join("");
}

init();
</script>

</body>
</html>
