<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>第n回大学東方合同合宿 自由参加企画ナビ</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: sans-serif;
  background: #f5efe6;
  color: #3b2f2f;
  margin: 0;
  padding: 0;
}

header {
  padding: 20px;
  font-size: 24px;
}

.section {
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
}

.running { background: #ffe4e1; }
.soon { background: #fff8dc; }
.ended { opacity: 0.5; }
</style>
</head>

<body>

<header>
第n回大学東方合同合宿　自由参加企画ナビ
</header>

<div class="section" id="current"></div>
<div class="section" id="soon"></div>
<div class="section" id="list"></div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbyyp2QpqsWxeP4eDrB_ftmSrii5Ymy4VZuhM0UxlzTNZbqIXgELZ__Xc0KxfZU6tRyw/exec";

const CAMP_START_DATE = "2026/08/20";
const SOON_MINUTES = 30;

function resolveRealDate(dayLabel) {
  const [y,m,d] = CAMP_START_DATE.split("/").map(Number);
  const base = new Date(y,m-1,d);

  if (dayLabel === "1日目") return base;
  if (dayLabel === "2日目") {
    base.setDate(base.getDate()+1);
    return base;
  }
  if (dayLabel === "3日目") {
    base.setDate(base.getDate()+2);
    return base;
  }
  return new Date(dayLabel);
}

function parseDateTime(date, time) {
  if (!time || time === "未定") return null;

  const d = resolveRealDate(date);
  const [h, m] = time.split(":").map(Number);

  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, m);
}

function getStatus(ev) {
  const now = new Date();
  if (!ev.start) return "other";

  const diff = (ev.start - now) / 60000;

  if (ev.start <= now && (!ev.end || ev.end >= now)) return "running";
  if (diff >= 0 && diff <= SOON_MINUTES) return "soon";
  if (ev.end && ev.end < now) return "ended";

  return "other";
}

function normalizeEvent(ev) {
  const start = parseDateTime(ev.date, ev.start_time);
  let end = parseDateTime(ev.date, ev.end_time);

  if (start && end && end < start) {
    end.setDate(end.getDate()+1);
  }

  return {
    ...ev,
    start,
    end,
    sensitive: String(ev.sensitive).toUpperCase() === "TRUE"
  };
}

function render(events) {
  const current = [];
  const soon = [];
  const others = [];

  events.forEach(ev => {
    const status = getStatus(ev);
    if (status === "running") current.push(ev);
    else if (status === "soon") soon.push(ev);
    else others.push(ev);
  });

  const makeCard = (ev) => {
    return `<div class="card">
      <b>${ev.title}</b><br>
      ${ev.date} ${ev.start_time}〜${ev.end_time}<br>
      ${ev.location}<br>
      ${ev.summary}<br>
      ${ev.host}
    </div>`;
  };

  document.getElementById("current").innerHTML =
    "<h2>いま開催中</h2>" + (current.map(makeCard).join("") || "なし");

  document.getElementById("soon").innerHTML =
    "<h2>まもなく開始</h2>" + (soon.map(makeCard).join("") || "なし");

  document.getElementById("list").innerHTML =
    "<h2>一覧</h2>" + others.map(makeCard).join("");
}

async function init() {
  const res = await fetch(DATA_URL);
  const json = await res.json();
  const events = json.events.map(normalizeEvent).filter(e => !e.sensitive);
  render(events);
}

init();
</script>

</body>
</html>
